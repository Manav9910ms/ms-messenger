<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>
    MS Messenger
  </title>

  <link rel="icon" href="favicon.png">

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->

    <div class="sidebar" id="sidebar">

      <div class="logo">
        MS Messenger
      </div>

      <div class="profile">

        <img id="profilePic">

        <div>

          <div id="profileName">
            Guest
          </div>

          <div class="onlineText">
            ● Online
          </div>

        </div>

      </div>

      <button id="loginBtn">
        Sign In With Google
      </button>

      <button id="logoutBtn">
        Logout
      </button>

      <input type="text"
             id="searchInput"
             placeholder="Search users...">

      <div class="usersTitle">
        USERS
      </div>

      <div id="usersList"></div>

    </div>

    <!-- CHAT AREA -->

    <div class="chatArea" id="chatArea">

      <div id="chatHeader">

        <button id="backBtn">
  ←
</button>

        <div id="chatUserName">
          Select User
        </div>

        <div id="chatUserStatus"></div>

      </div>

      <div id="chatMessages"></div>

      <div class="messageBox">

        <input type="text"
               id="messageInput"
               placeholder="Type message...">

        <button id="sendBtn">
          Send
        </button>

      </div>

    </div>

  </div>

  <script type="module"
          src="script.js"></script>

</body>

</html>
