<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <meta name="description"
content="MS Messenger is a futuristic cyberpunk realtime chat platform by ManavSols with private messaging, online status, and neon UI.">

<meta name="keywords"
content="MS Messenger, messenger, chat app, online chat, cyberpunk messenger, realtime chat app, neon messenger, ManavSols, manav sols">

<meta name="author"
content="ManavSols">

<meta property="og:title"
content="MS Messenger">

<meta property="og:description"
content="Cyberpunk realtime messaging platform by ManavSols">

<meta property="og:type"
content="website">

<meta property="og:url"
content="https://chat.manavsols.com">

  <title>MS Messenger</title>

  <link rel="icon" href="favicon.png">

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->

    <div class="sidebar">

      <div class="logo">
        MS Messenger
      </div>

      <div class="profile">

        <img id="profilePic">

        <div>

          <div id="profileName">
            Guest
          </div>

          <div class="onlineText">
            ● Online
          </div>

        </div>

      </div>

      <button id="loginBtn">
        Sign In With Google
      </button>

      <button id="logoutBtn">
        Logout
      </button>

      <input type="text"
             id="searchInput"
             placeholder="Search users...">

      <div class="usersTitle">
        USERS
      </div>

      <div id="usersList"></div>

    </div>

    <!-- CHAT AREA -->

    <div class="chatArea">

      <div id="chatHeader">

        <div id="chatUserName">
          Select User
        </div>

        <div id="chatUserStatus">

        </div>

      </div>

      <div id="chatMessages"></div>

      <div class="messageBox">

        <input type="text"
               id="messageInput"
               placeholder="Type message...">

        <button id="sendBtn">
          Send
        </button>

      </div>

    </div>

  </div>

  <audio id="messageSound"
         src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">
  </audio>

  <script type="module"
          src="script.js"></script>

</body>

</html>
